<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jesse Tremblay — CV</title>

    <!-- SEO -->
    <meta name="description" content="CV — Jesse Tremblay, Saint-Amable, Québec. Candidat polyvalent bilingue — service, administration & technologie." />
    <meta name="author" content="Jesse Tremblay" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="color-scheme" content="light dark" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Jesse Tremblay — CV" />
    <meta property="og:description" content="Candidat polyvalent bilingue — service, administration & technologie. Disponible immédiatement." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Jesse Tremblay — Candidat polyvalent" />
    <meta property="og:locale" content="fr_CA" />
    <meta property="og:locale:alternate" content="en_CA" />
    <meta property="og:site_name" content="Jesse Tremblay — CV" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jesse Tremblay — CV" />
    <meta name="twitter:description" content="Candidat polyvalent bilingue — service, administration & technologie." />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:image:alt" content="Jesse Tremblay — Candidat polyvalent" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Theme init (prevent flash) -->
    <script>
      (function () {
        try {
          var k = 'jesse-cv-theme'
          var t = localStorage.getItem(k)
          if (t === 'dark') document.documentElement.classList.add('dark')
          else if (t === 'light') document.documentElement.classList.remove('dark')
          else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
            document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
